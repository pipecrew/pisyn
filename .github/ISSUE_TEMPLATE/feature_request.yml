name: ✨ Feature Request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "💡 Thanks for suggesting a feature! Please describe what you'd like."
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core API (App/Pipeline/Stage/Job)
        - GitLab CI synthesizer
        - GitHub Actions synthesizer
        - Tekton synthesizer
        - CLI
        - Local execution (pisyn run)
        - Reverse import (pisyn init)
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include API examples if possible.
      render: go
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
