version: 2

project_name: pisyn

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/pisyn
    binary: pisyn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.pisynVersion={{.Version}}

archives:
  - formats: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: pipecrew
    name: pisyn
  draft: false
  prerelease: auto
